---
- name: "Install Rclone package"
  ansible.builtin.apt:
    name: rclone
    state: present
    update_cache: true
  tags:
    - rclone_install

- name: "Create Rclone config directory for Paperless user"
  ansible.builtin.file:
    path: "{{ paperless_install_dir }}/.config/rclone"
    state: directory
    owner: paperless
    group: paperless
    mode: 0755
    recurse: true
  tags:
    - rclone_config_dir

- name: "Obscure the Rclone password"
  ansible.builtin.command: >
    rclone obscure "{{ rclone_webdav_pass }}"
  register: rclone_obscure_result
  changed_when: false
  no_log: true
  tags:
    - rclone_obscure

- name: "Extract obscured password"
  ansible.builtin.set_fact:
    rclone_webdav_pass_obscure: "{{ (rclone_obscure_result.stdout | regex_replace('^{\"obscure\":\"([^\"]+)\"}$', '\\1')) }}"
  tags:
    - rclone_obscure

- name: "Deploy Rclone configuration from template"
  ansible.builtin.template:
    src: "rclone.conf.j2"
    dest: "{{ paperless_install_dir }}/.config/rclone/rclone.conf"
    owner: paperless
    group: paperless
    mode: 0600
  tags:
    - rclone_config

- name: "Create synchronization script from template"
  ansible.builtin.template:
    src: "sync_script.sh.j2"
    dest: "/usr/local/bin/sync_nextcloud_to_paperless.sh"
    mode: "0755"
    owner: paperless
    group: paperless
  tags:
    - rclone_script

- name: "Ensure log directory exists"
  ansible.builtin.file:
    path: "{{ rclone_log_file | dirname }}"
    state: directory
    mode: 0755
    owner: paperless
    group: paperless
  tags:
    - rclone_log_dir

- name: "Add cron job for synchronization"
  ansible.builtin.cron:
    name: "Nextcloud → Paperless Sync"
    minute: "{{ rclone_cron_minute }}"
    job: "/usr/local/bin/sync_nextcloud_to_paperless.sh >> {{ rclone_log_file }} 2>&1"
    user: "{{ rclone_cron_user }}"
    state: present
  tags:
    - rclone_cron