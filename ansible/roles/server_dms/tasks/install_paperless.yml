---
- name: Prepare Virtualenv with latest build tools
  ansible.builtin.pip:
    virtualenv: "{{ paperless_venv_dir }}"
    virtualenv_command: python3.11 -m venv
    name: 
      - pip
      - setuptools
      - wheel
    state: latest
  become: true
  become_user: paperless

- name: Create Virtual Environment ans install requirements
  ansible.builtin.pip:
    virtualenv: "{{ paperless_venv_dir }}"
    virtualenv_command: python3.11 -m venv
    requirements: "{{ paperless_install_dir }}/requirements.txt"
  become: true
  become_user: paperless

- name: Create Paperless Configuration
  ansible.builtin.template:
    src: paperless.conf.j2
    dest: "{{ paperless_install_dir }}/paperless.conf"
    owner: paperless
    group: paperless
    mode: '0640'

- name: Run Paperless Database Migrations
  ansible.builtin.command:
    cmd: "{{ paperless_venv_dir }}/bin/python manage.py migrate"
    chdir: "{{ paperless_install_dir }}/src"
  become: true
  become_user: paperless
  register: migration_result
  changed_when: "'No migrations to apply' not in migration_result.stdout"

- name: Collect Static Files
  ansible.builtin.command:
    cmd: "{{ paperless_venv_dir }}/bin/python manage.py collectstatic --no-input"
    chdir: "{{ paperless_install_dir }}/src"
  become: true
  become_user: paperless
  changed_when: false

- name: Create Paperless Superuser (Non-Interactive)
  ansible.builtin.shell:
    cmd: |
      {{ paperless_venv_dir }}/bin/python manage.py shell -c "from django.contrib.auth.models import User; \
      User.objects.filter(username='admin').exists() or \
      User.objects.create_superuser('admin', '{{ paperless_admin_mail }}', '{{ paperless_db_pass }}')"
    chdir: "{{ paperless_install_dir }}/src"
  become: true
  become_user: paperless
  changed_when: false

- name: Install Paperless Systemd Units
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}.service"
    content: |
      [Unit]
      Description={{ item.desc }}
      After=network.target postgresql.service redis.service

      [Service]
      User=paperless
      Group=paperless
      WorkingDirectory={{ paperless_install_dir }}/src
      EnvironmentFile={{ paperless_install_dir }}/paperless.conf
      Environment=PYTHONPATH={{ paperless_install_dir }}/src
      ExecStart={{ item.exec }}
      Restart=always

      [Install]
      WantedBy=multi-user.target
  loop:
    - name: paperless-webserver
      desc: Paperless-ngx Web Server
      exec: "{{ paperless_venv_dir }}/bin/gunicorn -b 0.0.0.0:8000 paperless.wsgi"
    - name: paperless-worker
      desc: Paperless-ngx Celery Worker
      exec: "{{ paperless_venv_dir }}/bin/celery --app paperless worker --loglevel INFO"
    - name: paperless-scheduler
      desc: Paperless-ngx Celery Scheduler
      exec: "{{ paperless_venv_dir }}/bin/celery --app paperless beat --loglevel INFO"
  notify: Reload Systemd

- name: Enable and Start Paperless Services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - paperless-webserver
    - paperless-worker
    - paperless-scheduler